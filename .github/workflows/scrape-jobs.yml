name: Daily Job Scrape

on:
  schedule:
    - cron: '0 6 * * *' # 6 AM UTC daily (10 PM PST)
  workflow_dispatch: {} # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run scraper
        run: npx tsx scripts/scrape.ts

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/scrape-log.json
          git diff --staged --quiet || git commit -m "chore: daily job update $(date +%Y-%m-%d)"
          git push
        # The push triggers deploy.yml which builds and deploys to GitHub Pages
